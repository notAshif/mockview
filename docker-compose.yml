version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mockview-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mockview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mockview"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: mockview-backend
    restart: always
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mockview?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AQ.Ab8RN6LhwzqbKj4N-NryWFsvGmUuOxuqxIhFgSSZsS5byKFHMw}
      - PORT=3002
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: mockview-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
    depends_on:
      - backend

volumes:
  pgdata:
